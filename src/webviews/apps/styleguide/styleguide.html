<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style nonce="#{cspNonce}">
			@font-face {
				font-family: 'codicon';
				font-display: block;
				src: url('#{webroot}/codicon.ttf?79130123c9d3674a686cf03962523e8a') format('truetype');
			}
			@font-face {
				font-family: 'glicons';
				font-display: block;
				src: url('#{root}/dist/glicons.woff2?3d3b6b49216fbf8599689a88dae49520') format('woff2');
			}
			@font-face {
				font-family: 'seti';
				font-display: block;
				src: url('#{webroot}/media/seti.woff') format('woff');
			}
		</style>
	</head>

	<body
		class="preload"
		data-placement="#{placement}"
		data-vscode-context='{ "webview": "#{webviewId}", "webviewInstance": "#{webviewInstanceId}" }'
	>
		<gl-styleguide-app
			name="Styleguide"
			placement="#{placement}"
			bootstrap="#{state}"
			webroot="#{webroot}"
		></gl-styleguide-app>
	</body>
</html>
