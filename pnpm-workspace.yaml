packages:
    - '.'
    - 'packages/*'
    - 'packages/plus/*'

catalog:
    '@types/mocha': 10.0.10
    '@types/sinon': 21.0.1
    mocha: 11.7.5
    sinon: 21.1.2
    tinybench: 6.0.1
    tsx: 4.21.0
    typescript: 6.0.3

blockExoticSubdeps: true
enableGlobalVirtualStore: true

ignoredBuiltDependencies:
    - '@parcel/watcher'
    - '@playwright/browser-chromium'
    - '@swc/core'
    - '@vscode/vsce-sign'
    - es5-ext
    - esbuild
    - keytar
    - protobufjs
    - rs-module-lexer
    - sharp
    - ttf2woff2
    - unrs-resolver

minimumReleaseAge: 7200

minimumReleaseAgeExclude:
    - '@eamodio/*'
    - '@gitkraken/*'
    - '@vscode/*'
    - 'eslint@10.4.0'

patchedDependencies:
    fantasticon@4.1.0: patches/fantasticon@4.1.0.patch
