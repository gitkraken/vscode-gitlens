blockExoticSubdeps: true
enableGlobalVirtualStore: true

ignoredBuiltDependencies:
    - '@parcel/watcher'
    - '@playwright/browser-chromium'
    - '@swc/core'
    - '@vscode/vsce-sign'
    - es5-ext
    - esbuild
    - keytar
    - protobufjs
    - rs-module-lexer
    - sharp
    - ttf2woff2
    - unrs-resolver

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
    - '@eamodio/*'
    - '@gitkraken/*'
    - '@vscode/*'
    - 'lint-staged@16.4.0'
    - 'tinyexec@1.0.4'

patchedDependencies:
    fantasticon@4.1.0: patches/fantasticon@4.1.0.patch
