packages:
    - '.'
    - 'packages/*'
    - 'packages/plus/*'
    - 'tests/fixtures/*'

allowBuilds:
    '@parcel/watcher': false
    '@playwright/browser-chromium': false
    '@swc/core': false
    '@vscode/vsce-sign': false
    es5-ext: false
    esbuild: false
    keytar: false
    rs-module-lexer: false
    sharp: false
    ttf2woff2: false
    unrs-resolver: false

blockExoticSubdeps: true

catalog:
    '@gitkraken/provider-apis': 0.50.0
    # The @octokit/* packages depend on each other; version them as a family so a lone bump can't
    # split them. @octokit/graphql wants `@octokit/request: ^10.0.6` — see the overrides entry.
    '@octokit/graphql': 9.0.3
    '@octokit/request': 10.0.11
    '@octokit/request-error': 7.1.0
    '@octokit/types': 16.0.0
    '@types/mocha': 10.0.10
    '@types/sinon': 22.0.0
    esbuild: 0.28.1
    # Only @gitlens/utils depends on this, but it flows into the published @gitkraken/core-gitlens
    # manifest, which must never carry a version of its own to drift from.
    fast-string-truncated-width: 3.0.3
    ignore: 7.0.5
    mocha: 11.7.6
    sinon: 22.0.0
    tinybench: 6.0.2
    tsx: 4.22.4
    # 7.x is the native port: it ships `tsc` only — no `typescript.js` API and no `tsserver.js`. The
    # editor therefore uses VS Code's bundled TypeScript (hence no `js/ts.tsdk.path` in
    # .vscode/settings.json), and @custom-elements-manifest/analyzer keeps its own 5.4.x for the
    # compiler API it needs.
    typescript: 7.0.2
    # scripts/generateTelemetryDocs.mjs drives the compiler API (createProgram/getTypeChecker) to expand
    # the telemetry types into docs/telemetry-events.md, so it needs the JS compiler that 7.x dropped.
    # Pinned to 6.0.3 — the last version the generator ran under — so its output stays byte-identical.
    # Aliased rather than catalogued as `typescript` so the extension's own compiler is unaffected.
    typescript-6: npm:typescript@6.0.3
    vscode-uri: 3.1.0
    yaml: 2.9.0

enableGlobalVirtualStore: true

minimumReleaseAge: 7200

minimumReleaseAgeExclude:
    # First-party/trusted scopes — exempt from the release-age gate
    - '@eamodio/*'
    - '@gitkraken/*'
    - '@vscode/*'
    - '@oxfmt/binding-android-arm-eabi@0.60.0'
    - '@oxfmt/binding-android-arm64@0.60.0'
    - '@oxfmt/binding-darwin-arm64@0.60.0'
    - '@oxfmt/binding-darwin-x64@0.60.0'
    - '@oxfmt/binding-freebsd-x64@0.60.0'
    - '@oxfmt/binding-linux-arm-gnueabihf@0.60.0'
    - '@oxfmt/binding-linux-arm-musleabihf@0.60.0'
    - '@oxfmt/binding-linux-arm64-gnu@0.60.0'
    - '@oxfmt/binding-linux-arm64-musl@0.60.0'
    - '@oxfmt/binding-linux-ppc64-gnu@0.60.0'
    - '@oxfmt/binding-linux-riscv64-gnu@0.60.0'
    - '@oxfmt/binding-linux-riscv64-musl@0.60.0'
    - '@oxfmt/binding-linux-s390x-gnu@0.60.0'
    - '@oxfmt/binding-linux-x64-gnu@0.60.0'
    - '@oxfmt/binding-linux-x64-musl@0.60.0'
    - '@oxfmt/binding-openharmony-arm64@0.60.0'
    - '@oxfmt/binding-win32-arm64-msvc@0.60.0'
    - '@oxfmt/binding-win32-ia32-msvc@0.60.0'
    - '@oxfmt/binding-win32-x64-msvc@0.60.0'
    - '@oxlint/binding-android-arm-eabi@1.75.0'
    - '@oxlint/binding-android-arm64@1.75.0'
    - '@oxlint/binding-darwin-arm64@1.75.0'
    - '@oxlint/binding-darwin-x64@1.75.0'
    - '@oxlint/binding-freebsd-x64@1.75.0'
    - '@oxlint/binding-linux-arm-gnueabihf@1.75.0'
    - '@oxlint/binding-linux-arm-musleabihf@1.75.0'
    - '@oxlint/binding-linux-arm64-gnu@1.75.0'
    - '@oxlint/binding-linux-arm64-musl@1.75.0'
    - '@oxlint/binding-linux-ppc64-gnu@1.75.0'
    - '@oxlint/binding-linux-riscv64-gnu@1.75.0'
    - '@oxlint/binding-linux-riscv64-musl@1.75.0'
    - '@oxlint/binding-linux-s390x-gnu@1.75.0'
    - '@oxlint/binding-linux-x64-gnu@1.75.0'
    - '@oxlint/binding-linux-x64-musl@1.75.0'
    - '@oxlint/binding-openharmony-arm64@1.75.0'
    - '@oxlint/binding-win32-arm64-msvc@1.75.0'
    - '@oxlint/binding-win32-ia32-msvc@1.75.0'
    - '@oxlint/binding-win32-x64-msvc@1.75.0'
    - '@oxlint/plugins@1.75.0'
    - oxfmt@0.60.0
    - oxlint@1.75.0
    - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
    - '@oxlint-tsgolint/darwin-x64@7.0.2001'
    - '@oxlint-tsgolint/linux-arm64@7.0.2001'
    - '@oxlint-tsgolint/linux-x64@7.0.2001'
    - '@oxlint-tsgolint/win32-arm64@7.0.2001'
    - '@oxlint-tsgolint/win32-x64@7.0.2001'
    - oxlint-tsgolint@7.0.2001

overrides:
    '@opentelemetry/core@<2.8.0': ^2.8.0
    # @octokit/graphql's own `^10.0.6` range otherwise resolves to a second copy alongside
    # @gitlens/git-github's direct pin, and github.ts imports both.
    '@octokit/request': 'catalog:'
    '@types/vscode': '1.101.0'
    '@xmldom/xmldom@<0.8.13': ^0.8.13
    diff@>=6.0.0 <8.0.3: ^8.0.3
    esbuild: 'catalog:'
    handlebars: '4.7.9'
    ip-address@<=10.1.0: ^10.1.1
    'serialize-javascript@<7.0.5': '^7.0.5'

packageExtensions:
    '@gitkraken/gitkraken-components':
        dependencies:
            '@types/react': '*'
            '@types/react-dom': '*'

patchedDependencies:
    fantasticon@4.1.0: patches/fantasticon@4.1.0.patch
    lit-html: patches/lit-html.patch
