packages:
    - '.'
    - 'packages/*'
    - 'packages/plus/*'
    - 'tests/fixtures/*'

allowBuilds:
    '@parcel/watcher': false
    '@playwright/browser-chromium': false
    '@swc/core': false
    '@vscode/vsce-sign': false
    es5-ext: false
    esbuild: false
    keytar: false
    rs-module-lexer: false
    sharp: false
    ttf2woff2: false
    unrs-resolver: false

blockExoticSubdeps: true

catalog:
    '@types/mocha': 10.0.10
    '@types/sinon': 21.0.1
    mocha: 11.7.6
    sinon: 22.0.0
    tinybench: 6.0.2
    tsx: 4.22.4
    typescript: 6.0.3

enableGlobalVirtualStore: true

minimumReleaseAge: 7200

minimumReleaseAgeExclude:
    # First-party/trusted scopes — exempt from the release-age gate
    - '@eamodio/*'
    - '@gitkraken/*'
    - '@vscode/*'

overrides:
    '@opentelemetry/core@<2.8.0': ^2.8.0
    '@types/vscode': '1.101.0'
    '@xmldom/xmldom@<0.8.13': ^0.8.13
    diff@>=6.0.0 <8.0.3: ^8.0.3
    esbuild: '0.28.1'
    handlebars: '4.7.9'
    ip-address@<=10.1.0: ^10.1.1
    'serialize-javascript@<7.0.5': '^7.0.5'

packageExtensions:
    '@gitkraken/gitkraken-components':
        dependencies:
            '@types/react': '*'
            '@types/react-dom': '*'

patchedDependencies:
    fantasticon@4.1.0: patches/fantasticon@4.1.0.patch
