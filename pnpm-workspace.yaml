packages:
    - '.'
    - 'packages/*'
    - 'packages/plus/*'

catalog:
    '@types/mocha': 10.0.10
    '@types/sinon': 21.0.0
    mocha: 11.7.5
    sinon: 21.0.3
    tinybench: 6.0.0
    tsx: 4.21.0
    typescript: 6.0.2

blockExoticSubdeps: true
enableGlobalVirtualStore: true

ignoredBuiltDependencies:
    - '@parcel/watcher'
    - '@playwright/browser-chromium'
    - '@swc/core'
    - '@vscode/vsce-sign'
    - es5-ext
    - esbuild
    - keytar
    - protobufjs
    - rs-module-lexer
    - sharp
    - ttf2woff2
    - unrs-resolver

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
    - '@eamodio/*'
    - '@gitkraken/*'
    - '@vscode/*'
    - 'handlebars@4.7.9'
    - 'ovsx@0.10.10'

patchedDependencies:
    fantasticon@4.1.0: patches/fantasticon@4.1.0.patch
